services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mailgun_ses_proxy}
      MYSQL_USER: ${MYSQL_USER:-mailgun_ses_proxy}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - proxy-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  proxy:
    image: ${IMAGE:-mailgun-ses-proxy:latest}
    build:
      context: .
      dockerfile: dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthcheck >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  proxy-db:
