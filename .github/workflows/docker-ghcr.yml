name: CI And Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mailgun-ses-proxy

jobs:
  test:
    name: Test And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: DATABASE_URL='mysql://user:pass@127.0.0.1:3306/mailgun_ses_proxy' npm run db:generate

      - name: Run tests
        run: npm run test:run

      - name: Build app
        run: DATABASE_URL='mysql://user:pass@127.0.0.1:3306/mailgun_ses_proxy' npm run build

  docker:
    name: Build And Publish Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - test
      - docker
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          CHANGELOG_NOTES="$(awk -v version="$VERSION" '
            $0 ~ "^## " version " " { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d')"

          if [ -z "$CHANGELOG_NOTES" ]; then
            CHANGELOG_NOTES="- See commit history for changes in this release."
          fi

          RELEASE_NOTES=$(cat <<EOF
          ## Changes

          $CHANGELOG_NOTES

          ## Docker image

          Docker image:
          - \`$IMAGE_NAME:$TAG_NAME\`
          - \`$IMAGE_NAME:latest\`
          EOF
          )

          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --notes "$RELEASE_NOTES"
