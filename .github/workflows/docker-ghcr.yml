name: CI And Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mailgun-ses-proxy

jobs:
  test:
    name: Test And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: DATABASE_URL='mysql://user:pass@127.0.0.1:3306/mailgun_ses_proxy' npm run db:generate

      - name: Run tests
        run: npm run test:run

      - name: Build app
        run: DATABASE_URL='mysql://user:pass@127.0.0.1:3306/mailgun_ses_proxy' npm run build

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          RELEASE_NOTES=$(cat <<EOF
          Docker image:
          - \`$IMAGE_NAME:$TAG_NAME\`
          - \`$IMAGE_NAME:latest\`
          EOF
          )

          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --notes "$RELEASE_NOTES"
